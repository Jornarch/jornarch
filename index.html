<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jorn Connors Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f7f7f7;
      color: #000;
      overflow-x: hidden;
    }

    body {
      font-family: Arial, sans-serif;
    }

    .page-wrap {
      width: 100%;
      padding-top: 29px;
    }

    .header-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 60px 0 60px;
    }

    .header-left,
    .header-right {
      font-family: "Eurostile", Arial, sans-serif;
      font-size: 17px;
      letter-spacing: 1px;
      font-weight: 400;
      color: #3a312b;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-left img {
      width: 24px;
      height: auto;
      display: block;
    }

    .main-content {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .scroll-section {
      margin-top: 8px;
    }

    .scroll-wrapper {
      width: 100vw;
      max-width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      position: relative;
    }

    .horizontal-scroll-container {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 18px;
      scrollbar-gutter: stable;
      white-space: nowrap;
      position: relative;
    }

    .horizontal-scroll-container::-webkit-scrollbar {
      height: 10px;
    }

    .horizontal-scroll-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .horizontal-scroll-container::-webkit-scrollbar-thumb {
      background-color: #000;
      border-radius: 10px;
    }

    .horizontal-scroll-container {
      scrollbar-width: thin;
      scrollbar-color: #000 transparent;
    }

    .scroll-content {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0;
    }

    .scroll-item {
      flex: 0 0 auto;
      text-decoration: none;
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      color: inherit;
    }

    .scroll-item.animate-in {
      opacity: 1;
      transform: translateY(0);
    }

    .project-bg {
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      position: relative;
      height: 580px;
      aspect-ratio: 2001 / 1600;
      transition: opacity 0.3s ease;
    }

    .project-bg.englewood {
      aspect-ratio: 3201 / 1600;
    }

    .project-title,
    .project-meta {
      position: absolute;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      font-family: "Eurostile", Arial, sans-serif;
      color: #000;
    }

    .project-title {
      bottom: 14px;
      left: 22px;
      font-weight: 600;
      font-size: 17px;
    }

    .project-meta {
      bottom: 14px;
      right: 22px;
      font-size: 14px;
      font-weight: 400;
    }

    .project-bg:hover .project-title,
    .project-bg:hover .project-meta {
      opacity: 1;
    }

    .scroll-content:hover .project-bg:not(:hover) {
      opacity: 0.45;
    }

    .bottom-nav {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      margin-top: 43px;
      padding: 0 40px 50px 40px;
      flex-wrap: nowrap;
    }

    .bottom-nav a {
      display: block;
      text-decoration: none;
    }

    .bottom-nav img {
      display: block;
      width: 320px;
      max-width: 100%;
      height: auto;
      transition: filter 0.25s ease, transform 0.25s ease;
    }

    .bottom-nav a:hover img {
      filter: invert(1);
    }

    @media (max-width: 1100px) {
      .header-row {
        padding: 0 24px 0 24px;
      }

      .project-bg {
        height: 420px;
      }

      .bottom-nav {
        gap: 12px;
        padding: 0 20px 40px 20px;
      }

      .bottom-nav img {
        width: 30vw;
      }
    }

    @media (max-width: 768px) {
      .page-wrap {
        padding-top: 18px;
      }

      .header-row {
        padding: 0 16px 0 16px;
      }

      .header-left,
      .header-right {
        font-size: 13px;
      }

      .header-left img {
        width: 18px;
      }

      .project-bg {
        height: 300px;
      }

      .project-title {
        font-size: 14px;
      }

      .project-meta {
        font-size: 12px;
      }

      .bottom-nav {
        flex-wrap: wrap;
        margin-top: 28px;
      }

      .bottom-nav img {
        width: 88vw;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <header class="header-row">
      <div class="header-left">
        <img src="https://jornarch.com/wp-content/uploads/2026/03/logo.png" alt="Logo" onerror="this.style.display='none'">
        <span>PORTFOLIO</span>
      </div>
      <div class="header-right">JORN CONNORS</div>
    </header>

    <main class="main-content">
      <section class="scroll-section">
        <div class="scroll-wrapper">
          <div class="horizontal-scroll-container">
            <div class="scroll-content">

              <a href="https://jornarch.com/project-5/" class="scroll-item">
                <div class="project-bg englewood" style="background-image: url('https://jornarch.com/wp-content/uploads/2026/01/Artboard-1@4x-4.png');">
                  <span class="project-title">RIVER CHAPEL</span>
                  <div class="project-meta">Fall 2025</div>
                </div>
              </a>

              <a href="https://jornarch.com/project-2/" class="scroll-item">
                <div class="project-bg englewood" style="background-image: url('https://jornarch.com/wp-content/uploads/2025/10/Artboard-1@4x.png');">
                  <span class="project-title">ENGLEWOOD VILLAGE</span>
                  <div class="project-meta">Fall/Spring 2025</div>
                </div>
              </a>

              <a href="https://jornarch.com/project-1/" class="scroll-item">
                <div class="project-bg fieldhouse" style="background-image: url('https://jornarch.com/wp-content/uploads/2025/10/Artboard-1@4x-3.png');">
                  <span class="project-title">FIELDHOUSE</span>
                  <div class="project-meta">Fall 2023</div>
                </div>
              </a>

              <a href="https://jornarch.com/project-5/" class="scroll-item">
                <div class="project-bg coachhouse" style="background-image: url('https://jornarch.com/wp-content/uploads/2025/10/Artboard-1@4x-4.png');">
                  <span class="project-title">COACH HOUSE</span>
                  <div class="project-meta">Fall 2022</div>
                </div>
              </a>

            </div>
          </div>
        </div>
      </section>

      <section class="bottom-nav">
        <a href="https://jornarch.com/models/">
          <img src="https://jornarch.com/wp-content/uploads/2026/01/MODELS-1-1024x133.png" alt="Models">
        </a>

        <a href="https://jornarch.com/art-3/">
          <img src="https://jornarch.com/wp-content/uploads/2026/01/ART-1-1024x133.png" alt="Art">
        </a>

        <a href="https://jornarch.com/resume/">
          <img src="https://jornarch.com/wp-content/uploads/2026/01/RESUME-1-1024x133.png" alt="Resume">
        </a>
      </section>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.querySelector('.horizontal-scroll-container');
      const content = document.querySelector('.scroll-content');

      if (!container || !content) return;

      const originalItems = Array.from(content.children);
      const cloneCount = 2;

      for (let i = 0; i < cloneCount; i++) {
        originalItems.forEach(item => {
          const clone = item.cloneNode(true);
          content.appendChild(clone);
        });
      }

      let baseSpeed = 1.2;
      let scrollSpeed = baseSpeed;

      function autoScroll() {
        container.scrollLeft += scrollSpeed;

        const resetPoint = content.scrollWidth / (cloneCount + 1);
        if (container.scrollLeft >= resetPoint) {
          container.scrollLeft = 0;
        }

        requestAnimationFrame(autoScroll);
      }

      container.addEventListener('mouseenter', () => {
        scrollSpeed = baseSpeed * 0.5;
      });

      container.addEventListener('mouseleave', () => {
        scrollSpeed = baseSpeed;
      });

      const blocks = document.querySelectorAll('.scroll-item');
      blocks.forEach((el, index) => {
        setTimeout(() => {
          el.classList.add('animate-in');
        }, index * 200);
      });

      autoScroll();
    });
  </script>
</body>
</html>
