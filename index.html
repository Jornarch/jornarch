<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jorn Connors Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    .site-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 56px 10px 56px;
      background: #f5f5f5;
    }

    .site-header-left,
    .site-header-right {
      font-size: 18px;
      letter-spacing: 1px;
      font-weight: 300;
    }

    .homepage-wrap {
      width: 100%;
      padding-top: 8px;
      padding-bottom: 36px;
    }

    .scroll-wrapper {
      width: 100%;
      overflow: hidden;
    }

    .horizontal-scroll-container {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      scrollbar-width: none;
    }

    .horizontal-scroll-container::-webkit-scrollbar {
      display: none;
    }

    .scroll-content {
      display: inline-flex;
      align-items: center;
      gap: 28px;
      padding: 0 48px;
    }

    .scroll-item {
      display: block;
      flex: 0 0 auto;
      text-decoration: none;
      color: inherit;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .scroll-item.animate-in {
      opacity: 1;
      transform: translateY(0);
    }

    .project-bg {
      position: relative;
      width: 1080px;
      height: 600px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center center;
    }

    .project-title {
      position: absolute;
      left: 90px;
      bottom: 55px;
      font-size: 18px;
      font-weight: 700;
      color: #000;
    }

    .project-meta {
      position: absolute;
      right: 70px;
      bottom: 55px;
      font-size: 14px;
      color: #111;
    }

    .bottom-nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 18px 40px 30px 40px;
      flex-wrap: wrap;
    }

    .bottom-nav a {
      display: inline-block;
      min-width: 260px;
      background: #000;
      color: #fff;
      text-decoration: none;
      text-align: center;
      padding: 16px 24px;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .bottom-nav a:hover {
      opacity: 0.88;
    }

    @media (max-width: 1200px) {
      .project-bg {
        width: 92vw;
        height: 52vw;
      }

      .project-title {
        left: 28px;
        bottom: 24px;
      }

      .project-meta {
        right: 28px;
        bottom: 24px;
      }
    }

    @media (max-width: 768px) {
      .site-header {
        padding: 20px 20px 8px 20px;
      }

      .site-header-left,
      .site-header-right {
        font-size: 14px;
      }

      .scroll-content {
        padding: 0 20px;
        gap: 16px;
      }

      .project-title {
        font-size: 16px;
      }

      .project-meta {
        font-size: 12px;
      }

      .bottom-nav a {
        min-width: 180px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-left">PORTFOLIO</div>
    <div class="site-header-right">JORN CONNORS</div>
  </header>

  <main class="homepage-wrap">
    <div class="scroll-wrapper">
      <div class="horizontal-scroll-container">
        <div class="scroll-content">

          <a href="https://jornarch.com/project-5/" class="scroll-item">
            <div class="project-bg" style="background-image: url('https://jornarch.com/wp-content/uploads/2026/01/Artboard-1@4x-4.png');">
              <span class="project-title">RIVER CHAPEL</span>
              <div class="project-meta">Fall 2025</div>
            </div>
          </a>

          <a href="https://jornarch.com/project-2/" class="scroll-item">
            <div class="project-bg" style="background-image: url('https://jornarch.com/wp-content/uploads/2025/10/Artboard-1@4x.png');">
              <span class="project-title">ENGLEWOOD VILLAGE</span>
              <div class="project-meta">Fall/Spring 2025</div>
            </div>
          </a>

          <a href="https://jornarch.com/project-1/" class="scroll-item">
            <div class="project-bg" style="background-image: url('https://jornarch.com/wp-content/uploads/2025/10/Artboard-1@4x-3.png');">
              <span class="project-title">FIELDHOUSE</span>
              <div class="project-meta">Fall 2023</div>
            </div>
          </a>

          <a href="https://jornarch.com/project-5/" class="scroll-item">
            <div class="project-bg" style="background-image: url('https://jornarch.com/wp-content/uploads/2025/10/Artboard-1@4x-4.png');">
              <span class="project-title">COACH HOUSE</span>
              <div class="project-meta">Fall 2022</div>
            </div>
          </a>

        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="#">MODELS</a>
      <a href="#">ART</a>
      <a href="#">RESUME</a>
    </nav>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.querySelector('.horizontal-scroll-container');
      const content = document.querySelector('.scroll-content');

      if (!container || !content) return;

      const originalItems = Array.from(content.children);
      const cloneCount = 2;

      for (let i = 0; i < cloneCount; i++) {
        originalItems.forEach(item => {
          const clone = item.cloneNode(true);
          content.appendChild(clone);
        });
      }

      let baseSpeed = 1.2;
      let scrollSpeed = baseSpeed;

      function autoScroll() {
        container.scrollLeft += scrollSpeed;

        const resetPoint = content.scrollWidth / (cloneCount + 1);
        if (container.scrollLeft >= resetPoint) {
          container.scrollLeft = 0;
        }

        requestAnimationFrame(autoScroll);
      }

      container.addEventListener('mouseenter', () => {
        scrollSpeed = baseSpeed * 0.5;
      });

      container.addEventListener('mouseleave', () => {
        scrollSpeed = baseSpeed;
      });

      const blocks = document.querySelectorAll('.scroll-item');
      blocks.forEach((el, index) => {
        setTimeout(() => {
          el.classList.add('animate-in');
        }, index * 160);
      });

      autoScroll();
    });
  </script>
</body>
</html>
